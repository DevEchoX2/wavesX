<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Player - WAVES</title>
  <link rel="stylesheet" href="player.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
</head>
<body>

  <nav class="topBar">
    <button class="iconBtn" onclick="window.location.href='../index.html'">
      <span class="material-symbols-outlined">arrow_back</span>
      <span>Back</span>
    </button>
    <div class="topActions">
      <button class="iconBtn"><span class="material-symbols-outlined">favorite</span> Save</button>
    </div>
  </nav>

  <main class="contentGrid">
    <section class="mainVideoSection">
      <div class="playerWrapper">
        <iframe id="videoIframe" allowfullscreen></iframe>
      </div>
      
      <div class="videoDetails">
        <h1 id="videoTitle"></h1>
        <div class="channelInfoRow">
          <div class="channelName" id="channelName"></div>
          <div class="stats" id="videoStats"></div>
        </div>
        
        <div class="descriptionBox">
          <p id="videoDescription"></p>
          <button id="showMoreBtn" style="display:none;">Show more</button>
        </div>
      </div>
    </section>

    <aside class="sidebar">
      <div class="sectionHeader">Up next</div>
      <div class="upNextContainer" id="upNextList"></div>
    </aside>
  </main>

  <script src="../env/config.js"></script>
  <script src="player.js"></script>
</body>
</html>
