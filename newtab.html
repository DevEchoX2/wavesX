<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Tab</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
  body { background-color: #050505; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff; }
  .brandText { font-size: 4rem; font-weight: 700; color: #fff; letter-spacing: 0.8rem; margin-bottom: 40px; margin-left: 0.8rem; }
  .inputWrap { width: 100%; max-width: 500px; position: relative; margin-bottom: 60px; }
  .inputWrap input { width: 100%; background-color: #0d0d0d; border: 1px solid #2a2a2a; border-radius: 12px; padding: 16px 20px 16px 50px; color: #fff; font-size: 14px; outline: none; transition: all 0.2s ease; }
  .inputWrap input:focus { border-color: #888; }
  .inputWrap .material-symbols-outlined { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #888; font-size: 20px; }
  .linkGrid { display: flex; gap: 35px; }
  .linkCard { display: flex; flex-direction: column; align-items: center; gap: 12px; cursor: pointer; color: #888; transition: all 0.2s ease; }
  .linkCard:hover { color: #fff; }
  .iconTile { width: 48px; height: 48px; background-color: #0d0d0d; border: 1px solid #2a2a2a; border-radius: 12px; display: flex; justify-content: center; align-items: center; transition: all 0.2s ease; }
  .linkCard:hover .iconTile { background-color: #1a1a1a; }
  .iconTile .material-symbols-outlined { font-size: 22px; }
  .cardName { font-size: 11px; letter-spacing: 0.5px; }
</style>
</head>
<body>
  <div class="brandText">WAVES</div>
  
  <div class="inputWrap">
    <span class="material-symbols-outlined">search</span>
    <input type="text" id="nt-search" placeholder="Search or enter URL...">
  </div>

  <div class="linkGrid">
    <div class="linkCard" data-url="https://youtube.com">
      <div class="iconTile"><span class="material-symbols-outlined">play_circle</span></div>
      <span class="cardName">youtube</span>
    </div>
    <div class="linkCard" data-url="https://github.com">
      <div class="iconTile"><span class="material-symbols-outlined">code</span></div>
      <span class="cardName">github</span>
    </div>
    <div class="linkCard" data-url="https://discord.com">
      <div class="iconTile"><span class="material-symbols-outlined">sports_esports</span></div>
      <span class="cardName">discord</span>
    </div>
    <div class="linkCard" data-url="https://twitter.com">
      <div class="iconTile"><span class="material-symbols-outlined">close</span></div>
      <span class="cardName">twitter</span>
    </div>
    <div class="linkCard" data-url="https://reddit.com">
      <div class="iconTile"><span class="material-symbols-outlined">chat_bubble</span></div>
      <span class="cardName">reddit</span>
    </div>
    <div class="linkCard" data-url="https://instagram.com">
      <div class="iconTile"><span class="material-symbols-outlined">photo_camera</span></div>
      <span class="cardName">instagram</span>
    </div>
  </div>

  <script>
    function formatURL(query) {
      if (query.startsWith('http://') || query.startsWith('https://')) return query;
      if (query.includes('.') && !query.includes(' ')) return 'https://' + query;
      return 'https://duckduckgo.com/?q=' + encodeURIComponent(query);
    }

    const searchInput = document.getElementById('nt-search');
    searchInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && searchInput.value.trim() !== '') {
        const targetUrl = formatURL(searchInput.value.trim());
        
        if (window.parent && window.parent.document.getElementById('omnibox')) {
          window.parent.document.getElementById('omnibox').value = targetUrl;
        }
        
        window.location.href = targetUrl; 
      }
    });

    document.querySelectorAll('.linkCard').forEach(card => {
      card.addEventListener('click', () => {
        const targetUrl = card.getAttribute('data-url');
        
        if (window.parent && window.parent.document.getElementById('omnibox')) {
          window.parent.document.getElementById('omnibox').value = targetUrl;
        }
        
        window.location.href = targetUrl;
      });
    });
  </script>
</body>
</html>
