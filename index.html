<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Waves</title>
  <link rel="stylesheet" href="styles/index.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body>
  <div class="wavesBg">WAVES</div>
  <div class="wavesContainer active">
    <div class="wave wave1"></div>
    <div class="wave wave2"></div>
    <div class="wave wave3"></div>
  </div>

  <div class="uiWrapper active">
    <div class="sideNav">
      <button class="navBtn active">Home</button>
      <button class="navBtn" onclick="window.location.href='pages/browser.html'">Browser</button>
      <button class="navBtn" onclick="window.location.href='pages/chat.html'">Chat</button>
      <button class="navBtn" onclick="window.location.href='pages/login.html'">Log In</button>
      <button class="navBtn" onclick="window.location.href='pages/signup.html'">Sign Up</button>
    </div>

    <div class="mainPanel">
      <div class="panelBtn spanTwo" onclick="window.location.href='pages/chat.html'">
        <span class="material-symbols-outlined">chat</span>
        <span class="label">Open Chat</span>
      </div>
      <div class="panelBtn" onclick="window.location.href='pages/browser.html'">
        <span class="material-symbols-outlined">language</span>
        <span class="label">Open Browser</span>
      </div>
      <div class="panelBtn" onclick="window.location.href='pages/login.html'">
        <span class="material-symbols-outlined">login</span>
        <span class="label">Log In</span>
      </div>
      <div class="panelBtn" onclick="window.location.href='pages/signup.html'">
        <span class="material-symbols-outlined">person_add</span>
        <span class="label">Sign Up</span>
      </div>
      <div class="panelBtn spanTwo locked">
        <span class="material-symbols-outlined">construction</span>
        <span class="label">More Coming Soon</span>
      </div>
    </div>
  </div>
</body>
</html>
