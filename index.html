<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Waves | Chat</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body>

  <div class="appContainer">
    <aside class="sidebarLeft">
      <div class="sidebarHeader">
        <span class="brand">Waves</span>
      </div>
      
      <div class="sectionLabel">CHANNELS</div>
      <div class="channelList" id="channelList">
        </div>

      <div class="userProfileCard">
        <div class="userAvatar"></div>
        <div class="userMeta">
          <span class="userName">Loading...</span>
          <span class="userStatus">Active</span>
        </div>
      </div>
    </aside>

    <main class="chatArea">
      <header class="chatHeader">
        <div class="channelTitle">
          <span class="hashtag">#</span>
          <span id="currentChannelName">general</span>
        </div>
        <button id="toggleMembers" class="headerBtn active">
          <span class="material-symbols-outlined">group</span>
        </button>
      </header>

      <div class="messageFeed" id="messageFeed">
        </div>

      <div class="inputArea">
        <div class="inputContainer">
          <input type="text" id="messageInput" placeholder="Message #general" autocomplete="off">
          <button id="sendBtn" class="sendBtn">
            <span class="material-symbols-outlined">send</span>
          </button>
        </div>
      </div>
    </main>

    <aside class="sidebarRight" id="sidebarRight">
      <div class="sidebarHeaderRight">
        <span>Active Members</span>
      </div>
      <div class="memberList" id="memberList">
        </div>
    </aside>
  </div>

  <script type="module" src="js/chat.js"></script>
</body>
</html>
