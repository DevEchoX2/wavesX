<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Games - WAVES</title>
<link rel="stylesheet" href="../css/games.css">
<link rel="stylesheet" href="../css/dropdown.css">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
</head>
<body>

<div class="topBar">
  <div class="dropdownWrapper">
    <span class="material-symbols-outlined">grid_view</span>
    <select class="categorySelect" id="categorySelect">
      <option value="game">game</option>
      <option value="zone">zone</option>
    </select>
  </div>
  
  <div class="searchWrapper">
    <span class="material-symbols-outlined searchIcon">search</span>
    <input type="text" id="searchInput" placeholder="Search...">
  </div>
  
  <div class="gameCountWrapper">
    <span id="gameCount">0</span> games
  </div>
</div>

<div class="mainContainer">
  <div class="gamesGrid" id="gamesGrid">
  </div>
</div>

<button class="backBtn" onclick="window.location.href='../index.html'">
  <span class="material-symbols-outlined">arrow_back</span>
</button>

<script src="../js/games.js"></script>
</body>
</html>
