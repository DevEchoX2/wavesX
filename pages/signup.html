<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Waves</title>
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body>
  <div class="wavesContainer active">
    <div class="wave wave1"></div>
    <div class="wave wave2"></div>
    <div class="wave wave3"></div>
  </div>

  <div class="auth-card">
    <div class="auth-header">
      <h2>Account</h2>
      <br>
      <h1>Sign Up</h1>
      <p>Create your Waves account.</p>
    </div>
    <form id="signupForm" class="form-group">
      <input type="text" id="username" class="form-input" placeholder="Username" required>
      <input type="email" id="email" class="form-input" placeholder="Email" required>
      <input type="password" id="password" class="form-input" placeholder="Password" required>
      <input type="file" id="pfp" class="form-input" accept="image/*" style="padding: 12px;">
      <button type="submit" class="submit-btn">Sign Up</button>
    </form>
    <div class="auth-footer">
      <span>Already have an account? <a href="login.html">Log in</a></span>
    </div>
  </div>
  <script src="../js/signup.js"></script>
</body>
</html>
