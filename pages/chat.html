<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chat</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/chat.css">
</head>
<body>
  <div class="app-container">
    <aside class="sidebar-left">
      <div class="sidebar-tabs">
        <button class="tab-btn active"><i class="fa-solid fa-hashtag"></i> Channels</button>
        <button class="tab-btn"><i class="fa-regular fa-message"></i> DMs</button>
      </div>
      <div class="channel-list" id="channelList">
        <div class="category">
          <div class="category-header">
            <span>Chatrooms</span>
            <div class="category-actions">
              <i class="fa-regular fa-folder"></i>
              <i class="fa-solid fa-plus"></i>
            </div>
          </div>
          <div class="subcategory"><i class="fa-solid fa-chevron-down"></i> Information</div>
          <div class="channel-item" data-channel="announcements"><i class="fa-solid fa-bullhorn"></i> announcements</div>
          <div class="channel-item" data-channel="updates"><i class="fa-solid fa-bell"></i> updates</div>
          <div class="subcategory"><i class="fa-solid fa-chevron-down"></i> Social</div>
          <div class="channel-item active" data-channel="general"><i class="fa-solid fa-hashtag"></i> general</div>
        </div>
      </div>
      <div class="current-user">
        <div class="user-info">
          <div class="avatar">
            <img id="currentUserPfp" alt="pfp" src="">
          </div>
          <span id="displayUsername" class="username"></span>
        </div>
        <button id="logoutBtn" class="icon-btn"><i class="fa-solid fa-right-from-bracket"></i></button>
      </div>
    </aside>

    <main class="chat-main">
      <header class="chat-header">
        <i class="fa-solid fa-hashtag header-hash"></i>
        <span id="chatTitle">general</span>
      </header>
      <div class="message-container" id="messageContainer"></div>
      <div class="input-area">
        <div class="input-wrapper">
          <button class="action-btn attach-btn"><i class="fa-solid fa-circle-plus"></i></button>
          <input type="text" id="messageInput" placeholder="Message #general" autocomplete="off">
          <button class="action-btn emoji-btn"><i class="fa-regular fa-face-smile"></i></button>
          <button class="action-btn send-btn" id="sendBtn"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
      </div>
    </main>

    <aside class="sidebar-right">
      <div class="members-header">
        <i class="fa-solid fa-user-group"></i> Members
      </div>
      <div class="members-list" id="membersList"></div>
    </aside>
  </div>
  <script src="../js/chat.js"></script>
</body>
</html>
