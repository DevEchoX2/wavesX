<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>waves | chat</title>
<link rel="stylesheet" href="../css/chat.css">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
</head>
<body>

  <div class="chatLayout">
    <aside class="sidebarLeft">
      <div class="brandHeader">
        <span class="brandName">WAVES</span>
      </div>
      
      <div class="channelContainer">
        <span class="sectionTitle">CHANNELS</span>
        <div class="channelList" id="channelList"></div>
      </div>

      <div class="currentUser">
        <div class="userAvatar"></div>
        <div class="userInfo">
          <span class="userName"></span>
          <span class="userStatus">Online</span>
        </div>
        <button class="settingsBtn"><span class="material-symbols-outlined">settings</span></button>
      </div>
    </aside>

    <main class="chatCore">
      <header class="chatHeader">
        <div class="channelInfo">
          <span class="material-symbols-outlined">tag</span>
          <span id="currentChannelName" class="channelTitle">general</span>
        </div>
        <div class="headerActions">
          <button class="actionBtn"><span class="material-symbols-outlined">search</span></button>
          <button class="actionBtn" id="toggleMembers"><span class="material-symbols-outlined">group</span></button>
        </div>
      </header>

      <div class="messageFeed" id="messageFeed"></div>

      <div class="inputArea">
        <div class="inputWrapper">
          <button class="attachBtn"><span class="material-symbols-outlined">add_circle</span></button>
          <input type="text" id="messageInput" placeholder="Send a message...">
          <button class="sendBtn" id="sendBtn"><span class="material-symbols-outlined">send</span></button>
        </div>
      </div>
    </main>

    <aside class="sidebarRight" id="sidebarRight">
      <div class="membersHeader">
        <span class="sectionTitle">MEMBERS</span>
      </div>
      <div class="memberList" id="memberList"></div>
    </aside>
  </div>

  <button class="launcherBtn" onclick="window.location.href='../index.html'">
    <span class="material-symbols-outlined">home</span>
  </button>

  <script type="module" src="../js/chat.js"></script>
</body>
</html>
