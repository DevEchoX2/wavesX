<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat - Waves</title>
  <link rel="stylesheet" href="../css/chat.css">
</head>
<body>
  <div class="wavesContainer active">
    <div class="wave wave1"></div>
    <div class="wave wave2"></div>
    <div class="wave wave3"></div>
  </div>

  <div class="app-container">
    <nav class="sidebar-global" id="globalNav">
    </nav>

    <aside class="sidebar-channels">
      <div class="sidebar-header" id="contextHeader">
        Waves Server
      </div>
      <div class="channel-list" id="channelList">
        <div class="channel-item active" data-channel="general">
          <span class="hash">#</span> general
        </div>
        <div class="channel-item" data-channel="music">
          <span class="hash">#</span> music
        </div>
        <div class="channel-item" data-channel="gaming">
          <span class="hash">#</span> gaming
        </div>
      </div>
    </aside>

    <main class="chat-area">
      <div class="chat-header" id="chatHeader">
        # general
      </div>
      
      <div class="message-container" id="messageContainer">
      </div>

      <div class="input-area">
        <div class="input-wrapper">
          <input type="text" id="messageInput" class="chat-input" placeholder="Type a message..." autocomplete="off">
          <button id="sendBtn" class="send-btn">➤</button>
        </div>
      </div>
    </main>

    <aside class="sidebar-members" id="membersList">
    </aside>

  </div>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="../js/chat.js"></script>
</body>
</html>
